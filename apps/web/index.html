<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conductor — نظام تخطيط الموارد</title>
    <!-- Conductor brand icon system (apps/web/public/branding). favicon.svg auto-adapts to light/dark. -->
    <link rel="icon" href="/branding/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/branding/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" sizes="180x180" href="/branding/apple-touch-icon.png" />
    <link rel="manifest" href="/branding/site.webmanifest" />
    <meta name="msapplication-config" content="/branding/browserconfig.xml" />
    <meta name="theme-color" content="#000000" />
    <!-- Apply the saved presentation preferences before first paint to avoid a flash (no-FOUC).
         Mirrors src/prefs.ts: theme (resolved), accent, density, font size, contrast, motion. -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var t = localStorage.getItem("erp.theme");
          if (t !== "dark" && t !== "light") {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          root.setAttribute("data-theme", t);
          root.setAttribute("data-accent", localStorage.getItem("erp.accent") || "blue");
          root.setAttribute("data-density", localStorage.getItem("erp.density") || "comfortable");
          root.setAttribute("data-font-size", localStorage.getItem("erp.fontSize") || "default");
          root.setAttribute("data-contrast", localStorage.getItem("erp.contrast") || "normal");
          root.setAttribute("data-motion", localStorage.getItem("erp.motion") || "full");
          root.setAttribute("data-sidebar", localStorage.getItem("erp.sidebar") || "expanded");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
